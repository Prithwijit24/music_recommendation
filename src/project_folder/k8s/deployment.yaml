apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-recommendation-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: music-recommendation-app
  template:
    metadata:
      labels:
        app: music-recommendation-app
    spec:
      containers:
        - name: streamlit
          image: music-recommendation-system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            - name: PYTHONPATH
              value: /app/src
