name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  security-events: write

jobs:
  quality-and-security:
    name: Lint, Test, Security
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint with Ruff
        run: uv run ruff check src tests streamlit_app.py main.py

      - name: Run unit tests with coverage
        run: uv run pytest --cov=src/music_recommendation --cov-report=xml --cov-report=term-missing

      - name: Run Bandit security scan
        run: uv run bandit -r src -c pyproject.toml -f json -o bandit-report.json

      - name: Dependency vulnerability audit
        run: uv run pip-audit --progress-spinner off --format json --output pip-audit-report.json

      - name: Build Docker image
        run: docker build -t music-recommendation-system:ci .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: music-recommendation-system:ci
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
            trivy-fs.sarif
            trivy-image.sarif
            coverage.xml

  sonar:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    needs: quality-and-security
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Generate coverage report
        run: uv run pytest --cov=src/music_recommendation --cov-report=xml

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
